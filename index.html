<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── DARK THEME (default) ── */
:root{
  --bg:#0d0d14;
  --s1:#161622;
  --s2:#1c1c2a;
  --s3:#252537;
  --border:#2a2a3e;
  --border2:#333349;
  --acc:#7c6dfa;
  --acc-l:#9d8fff;
  --acc-d:rgba(124,109,250,.13);
  --text:#e2e2ee;
  --muted:#7070a0;
  --dim:#4a4a6a;
  --ok:#34d399;
  --ok-d:rgba(52,211,153,.13);
  --warn:#fbbf24;
  --warn-d:rgba(251,191,36,.13);
  --err:#f87171;
  --err-d:rgba(248,113,113,.13);
  --HH:52px;
  --shadow:rgba(0,0,0,.5);
  --slot-line:rgba(255,255,255,.04);
  --slot-half:rgba(255,255,255,.03);
  --task-bg:rgba(124,109,250,.14);
  --task-border:rgba(124,109,250,.28);
  --task-done-bg:rgba(52,211,153,.1);
  --task-done-border:rgba(52,211,153,.25);
  --task-wip-bg:rgba(251,191,36,.1);
  --task-wip-border:rgba(251,191,36,.25);
  --handle-bar:rgba(255,255,255,.28);
  --today-col:rgba(124,109,250,.025);
  --picker-filter:invert(.5);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f2f2f8;
  --s1:#ffffff;
  --s2:#f8f8fd;
  --s3:#ededf7;
  --border:#dcdcee;
  --border2:#cacacc;
  --acc:#6c5ce7;
  --acc-l:#7c6cf5;
  --acc-d:rgba(108,92,231,.1);
  --text:#1a1a30;
  --muted:#6666a0;
  --dim:#9999c0;
  --ok:#00a878;
  --ok-d:rgba(0,168,120,.1);
  --warn:#b87800;
  --warn-d:rgba(184,120,0,.1);
  --err:#d63031;
  --err-d:rgba(214,48,49,.1);
  --shadow:rgba(0,0,0,.15);
  --slot-line:rgba(0,0,0,.07);
  --slot-half:rgba(0,0,0,.04);
  --task-bg:rgba(108,92,231,.09);
  --task-border:rgba(108,92,231,.24);
  --task-done-bg:rgba(0,168,120,.09);
  --task-done-border:rgba(0,168,120,.24);
  --task-wip-bg:rgba(184,120,0,.09);
  --task-wip-border:rgba(184,120,0,.24);
  --handle-bar:rgba(0,0,0,.2);
  --today-col:rgba(108,92,231,.03);
  --picker-filter:opacity(.45);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;overflow:hidden}

/* ── AUTH SCREEN ── */
.auth-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.auth-card{
  width:100%;max-width:390px;
  background:var(--s1);border:1px solid var(--border);
  border-radius:22px;padding:38px 36px;
  box-shadow:0 32px 80px rgba(0,0,0,.4);
}
.auth-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
.auth-tabs{display:flex;gap:2px;background:var(--s3);border-radius:11px;padding:3px;margin-bottom:26px}
.auth-tab{flex:1;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;transition:.15s}
.auth-tab.active{background:var(--s1);color:var(--text);box-shadow:0 1px 4px var(--shadow)}
.auth-error{padding:10px 14px;border-radius:9px;margin-bottom:14px;background:var(--err-d);border:1px solid rgba(248,113,113,.3);color:var(--err);font-size:13px}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:10px;padding:11px 20px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;z-index:20}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#7c6dfa,#a855f7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700;letter-spacing:-1px;flex-shrink:0}
.logo-name{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.4px}
.hdr-today{font-size:13px;color:var(--muted);margin-left:4px}
.hdr-space{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:.15s all;white-space:nowrap}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc-l);box-shadow:0 4px 14px rgba(124,109,250,.35);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--s3);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-danger{background:var(--err-d);color:var(--err);border:1px solid rgba(248,113,113,.3)}
.btn-danger:hover{background:var(--err);color:#fff;box-shadow:0 4px 12px rgba(248,113,113,.3)}
.theme-btn{width:34px;height:34px;padding:0;border-radius:8px;border:1px solid var(--border);background:var(--s3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;flex-shrink:0}
.theme-btn:hover{background:var(--border);transform:rotate(20deg)}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 5px;border-radius:20px;background:var(--s3);border:1px solid var(--border);flex-shrink:0}
.uc-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc),#a855f7);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;flex-shrink:0}
.uc-name{font-size:13px;font-weight:600;color:var(--text)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--s3);border-radius:10px;padding:3px}
.tab{padding:6px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;transition:.15s;letter-spacing:.1px}
.tab.active{background:var(--s1);color:var(--text);box-shadow:0 1px 4px var(--shadow)}

/* ── DAY HEADERS ── */
.cal-head{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
.time-gutter{width:58px;flex-shrink:0;border-right:1px solid var(--border)}
.day-headers{flex:1;display:flex}
.day-col-hdr{flex:1;min-width:110px;padding:10px 8px;text-align:center;border-right:1px solid var(--border);cursor:pointer;transition:.15s background}
.day-col-hdr:last-child{border-right:none}
.day-col-hdr.today{background:var(--acc-d)}
.day-col-hdr:hover{background:var(--s2)}
.dh-name{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.day-col-hdr.today .dh-name{color:var(--acc-l)}
.dh-num{font-size:24px;font-weight:700;color:var(--text);line-height:1.1;margin-top:1px}
.day-col-hdr.today .dh-num{color:var(--acc)}
.dh-month{font-size:11px;color:var(--dim);margin-top:1px}
.day-col-hdr.today .dh-month{color:var(--acc);opacity:.8}

/* ── ALL-DAY ROW ── */
.allday-wrap{display:flex;background:var(--s1);border-bottom:2px solid var(--border2);flex-shrink:0;min-height:38px}
.allday-gutter{width:58px;flex-shrink:0;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;padding:2px}
.allday-cells{flex:1;display:flex}
.allday-cell{flex:1;min-width:110px;border-right:1px solid var(--border);padding:4px 4px;display:flex;flex-wrap:wrap;gap:3px;align-content:flex-start}
.allday-cell:last-child{border-right:none}
.allday-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:500;background:var(--acc-d);border:1px solid var(--task-border);color:var(--acc-l);cursor:pointer;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:.15s}
.allday-chip:hover{filter:brightness(1.1)}
.allday-chip.s-done{background:var(--task-done-bg);border-color:var(--task-done-border);color:var(--ok);text-decoration:line-through;opacity:.7}
.allday-chip.s-in-progress{background:var(--task-wip-bg);border-color:var(--task-wip-border);color:var(--warn)}

/* ── CALENDAR SCROLL ── */
.cal-scroll{flex:1;overflow:auto;position:relative}
.cal-inner{display:flex;position:relative}
.time-labels{width:58px;flex-shrink:0;border-right:1px solid var(--border);background:var(--s1)}
.time-lbl{height:var(--HH);display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 8px 0 0;font-size:10px;color:var(--dim);font-weight:600;user-select:none}
.day-cols{flex:1;display:flex;position:relative}
.day-col{flex:1;min-width:110px;border-right:1px solid var(--border);position:relative}
.day-col:last-child{border-right:none}
.day-col.today{background:var(--today-col)}
.hour-slot{height:var(--HH);border-bottom:1px solid var(--slot-line);position:relative;cursor:crosshair}
.hour-slot::after{content:'';position:absolute;left:0;right:0;top:50%;border-bottom:1px dashed var(--slot-half);pointer-events:none}
.hour-slot:hover{background:var(--acc-d)}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--acc);z-index:3;pointer-events:none}
.now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--acc)}

/* ── TASK BLOCKS ── */
.task-block{
  position:absolute;left:2px;right:2px;
  border-radius:7px;padding:5px 8px;
  background:var(--task-bg);border:1px solid var(--task-border);border-left:3px solid var(--acc);
  cursor:grab;user-select:none;overflow:hidden;transition:.12s box-shadow;z-index:2;min-height:22px;
}
.task-block:hover{box-shadow:0 4px 16px rgba(124,109,250,.2);z-index:3}
.task-block.s-done{background:var(--task-done-bg);border-color:var(--task-done-border);border-left-color:var(--ok)}
.task-block.s-in-progress{background:var(--task-wip-bg);border-color:var(--task-wip-border);border-left-color:var(--warn)}
.task-block.is-dragging{opacity:.35;cursor:grabbing;z-index:1}
.task-block.drag-ghost{
  position:fixed;pointer-events:none;z-index:1000;opacity:.88;
  left:auto!important;right:auto!important;width:160px;
  box-shadow:0 10px 28px var(--shadow);transform:rotate(1.5deg);
}
.tb-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.tb-time{font-size:10px;color:var(--muted);margin-top:1px}
.tb-badge{font-size:10px;font-style:italic;margin-top:1px}
.tb-badge.s-in-progress{color:var(--warn)}
.tb-badge.s-done{color:var(--ok)}
.resize-handle{position:absolute;bottom:0;left:0;right:0;height:8px;cursor:ns-resize;display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s}
.task-block:hover .resize-handle{opacity:1}
.resize-handle::after{content:'';width:22px;height:3px;border-radius:2px;background:var(--handle-bar)}
.drop-ind{position:absolute;left:2px;right:2px;border-radius:7px;border:2px dashed var(--acc);background:var(--acc-d);pointer-events:none;z-index:4;display:none}

/* ── FUTURE PANEL ── */
.future-panel{border-top:1px solid var(--border);background:var(--s1);flex-shrink:0;max-height:200px;overflow:hidden;transition:.25s max-height}
.future-panel.collapsed{max-height:42px}
.fp-header{display:flex;align-items:center;gap:8px;padding:11px 22px;cursor:pointer;user-select:none;transition:.15s background}
.fp-header:hover{background:var(--s2)}
.fp-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fp-count{font-size:11px;padding:1px 7px;border-radius:10px;background:var(--acc-d);color:var(--acc-l);font-weight:700}
.fp-arrow{margin-left:auto;color:var(--dim);font-size:11px;transition:.2s transform}
.future-panel.collapsed .fp-arrow{transform:rotate(-90deg)}
.fp-body{overflow-y:auto;max-height:156px;padding:0 22px 12px}
.fp-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer}
.fp-item:last-child{border-bottom:none}
.fp-item:hover .fp-name{color:var(--acc-l)}
.fp-date{font-size:12px;color:var(--muted);font-weight:600;min-width:80px}
.fp-name{flex:1;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:.1s}
.fp-time{font-size:11px;color:var(--dim)}
.fp-status{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.fp-status.s-pending{background:rgba(112,112,160,.15);color:var(--muted)}
.fp-status.s-in-progress{background:var(--task-wip-bg);color:var(--warn)}
.fp-status.s-done{background:var(--task-done-bg);color:var(--ok)}

/* ── ALL TASKS VIEW ── */
.all-view{flex:1;overflow-y:auto;padding:24px 20px;display:none;flex-direction:column;align-items:center}
.all-view.active{display:flex}
.all-section{width:100%;max-width:660px;margin-bottom:10px}
.all-section-hdr{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;padding:10px 0 7px;border-bottom:1px solid var(--border);margin-bottom:6px}
.all-section-hdr.no-date-hdr{color:var(--muted)}
.all-card{display:flex;align-items:center;gap:14px;padding:12px 16px;margin-bottom:5px;border-radius:10px;background:var(--s2);border:1px solid var(--border);border-left:3px solid var(--acc);cursor:pointer;transition:.12s}
.all-card:hover{background:var(--s3);transform:translateX(2px)}
.all-card.s-done{border-left-color:var(--ok)}
.all-card.s-in-progress{border-left-color:var(--warn)}
.ac-body{flex:1;min-width:0}
.ac-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.all-card.s-done .ac-title{text-decoration:line-through;opacity:.5}
.ac-meta{font-size:12px;color:var(--muted);margin-top:3px}
.ac-desc{font-size:12px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-status{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.ac-status.s-pending{background:rgba(112,112,160,.15);color:var(--muted)}
.ac-status.s-in-progress{background:var(--task-wip-bg);color:var(--warn)}
.ac-status.s-done{background:var(--task-done-bg);color:var(--ok)}
.all-empty{text-align:center;color:var(--dim);padding:60px 0;font-size:15px}

/* ── ADMIN VIEW ── */
.admin-view{flex:1;overflow-y:auto;padding:28px 20px;display:none;flex-direction:column;align-items:center}
.admin-view.active{display:flex}
.admin-wrap{width:100%;max-width:640px}
.admin-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.admin-title{font-size:20px;font-weight:700}
.admin-sub{font-size:13px;color:var(--muted)}
.user-card{display:flex;align-items:center;gap:14px;padding:14px 18px;margin-bottom:8px;border-radius:12px;background:var(--s2);border:1px solid var(--border);transition:.15s}
.user-card:hover{border-color:var(--border2)}
.u-avatar{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;text-transform:uppercase;background:linear-gradient(135deg,var(--acc),#a855f7)}
.u-avatar.is-admin{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.u-info{flex:1;min-width:0}
.u-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.u-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700}
.u-badge.admin{background:rgba(245,158,11,.15);color:var(--warn)}
.u-badge.you{background:var(--acc-d);color:var(--acc-l)}
.u-meta{font-size:12px;color:var(--muted);margin-top:3px}
.u-tasks{font-size:13px;color:var(--dim);text-align:right;margin-right:8px;white-space:nowrap;flex-shrink:0}
.admin-loading{text-align:center;color:var(--muted);padding:60px 0;font-size:15px}

/* ── CONTEXT MENU ── */
.ctx-menu{position:fixed;z-index:300;background:var(--s2);border:1px solid var(--border2);border-radius:11px;padding:5px;box-shadow:0 12px 36px var(--shadow);min-width:190px;display:none;animation:ctxIn .12s ease}
.ctx-menu.open{display:block}
@keyframes ctxIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.ctx-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;font-size:13px;color:var(--text);cursor:pointer;transition:.1s background;border:none;background:transparent;width:100%;font-family:inherit;text-align:left}
.ctx-item:hover{background:var(--s3)}
.ctx-item.danger{color:var(--err)}
.ctx-item.danger:hover{background:var(--err-d)}
.ctx-item .ctx-icon{width:16px;text-align:center;font-size:13px;color:var(--muted);flex-shrink:0}
.ctx-item.danger .ctx-icon{color:var(--err)}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}
.ctx-sub-label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;padding:6px 11px 2px}
.ctx-item .ctx-check{margin-left:auto;font-size:12px;color:var(--acc);opacity:0}
.ctx-item.checked .ctx-check{opacity:1}
.ctx-item.checked .ctx-icon{color:var(--acc)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--s2);border:1px solid var(--border2);border-radius:18px;padding:28px;width:480px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px var(--shadow);animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--s3);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s}
.modal-close:hover{background:var(--err-d);color:var(--err)}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fi{width:100%;padding:10px 13px;background:var(--s3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.15s border-color;-webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--acc)}
textarea.fi{resize:vertical;min-height:76px}
.fg.row{display:flex;gap:12px}
.fg.row .fg{flex:1;margin-bottom:0}
.status-btns{display:flex;gap:8px}
.s-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--s3);color:var(--muted);cursor:pointer;text-align:center;font-size:13px;font-weight:500;transition:.15s;font-family:inherit}
.s-btn.active{border-color:var(--acc);background:var(--acc-d);color:var(--acc-l)}
.s-btn[data-s="done"].active{border-color:var(--ok);background:var(--task-done-bg);color:var(--ok)}
.s-btn[data-s="in-progress"].active{border-color:var(--warn);background:var(--task-wip-bg);color:var(--warn)}
.modal-footer{display:flex;gap:8px;justify-content:space-between;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
.modal-footer-left{display:flex;gap:8px}
.modal-footer-right{display:flex;gap:8px}

/* ── TOAST ── */

<script>
// ── SUPABASE ───────────────────────────────────────────────────────────────
const sb = supabase.createClient(
  'https://pkvexlivljddbggqlmjj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdmV4bGl2bGpkZGJnZ3FsbWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTMzOTIsImV4cCI6MjA5NjU2OTM5Mn0.1haUHwSbbxdyeKCGMh0jffe1IUffyGtK7-BRfon7IWo'

// Column name mapping: DB uses snake_case, frontend uses camelCase
function fromDb(row){
  return {
    id:          row.id,
    title:       row.title,
    date:        row.date        || null,
    startTime:   row.start_time  || null,
    endTime:     row.end_time    || null,
    description: row.description || '',
    status:      row.status      || 'pending'
  };
}
function toDb(task){
  return {
    title:       task.title,
    date:        task.date       || null,
    start_time:  task.startTime  || null,
    end_time:    task.endTime    || null,
    description: task.description || '',
    status:      task.status     || 'pending'
  };
}
function sbErr(e){ return e?.message || 'Ошибка сервера' }

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const HH=52, DS=0, DE=24, SNAP=15, TOTAL_H=24;

// ── STATE ──────────────────────────────────────────────────────────────────
let tasks=[], editId=null, selStatus='pending', weekDays=[];
let currentTab='week', drag=null, ghostEl=null, rz=null, ctxTaskId=null;
let currentUser=null;

// ── UTILS ──────────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2) }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function todayStr(){ return ymd(new Date()) }
function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
function parseDate(s){ const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d) }
function t2m(t){ if(!t) return 0; const[h,m]=t.split(':').map(Number); return h*60+m }
function m2t(m){ const h=Math.floor(m/60),mm=m%60; return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}` }
function fmt(t){ if(!t) return ''; const[h,m]=t.split(':').map(Number); return `${h}:${String(m).padStart(2,'0')}` }
function snapM(m){ return Math.round(m/SNAP)*SNAP }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)) }

const DN=['вс','пн','вт','ср','чт','пт','сб'];
const MN=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const STATUS_LABEL={pending:'Ожидает','in-progress':'В работе',done:'Выполнено'};

// ── THEME ──────────────────────────────────────────────────────────────────
function toggleTheme(){
  const next=document.documentElement.dataset.theme==='light'?'dark':'light';
  document.documentElement.dataset.theme=next;
  localStorage.setItem('tm_theme',next);
  document.getElementById('themeBtn').textContent=next==='light'?'🌙':'☀️';
}
function applyTheme(){
  const t=localStorage.getItem('tm_theme')||'dark';
  document.documentElement.dataset.theme=t;
  document.getElementById('themeBtn').textContent=t==='light'?'🌙':'☀️';
}

// ── AUTH ───────────────────────────────────────────────────────────────────
function toEmail(u){ return `${u.toLowerCase().replace(/[^a-z0-9]/g,'')}@tm.app` }

function showAuth(){
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function showApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tabAdmin').style.display=currentUser?.isAdmin?'':'none';
  document.getElementById('ucAvatar').textContent=(currentUser?.username||'?')[0].toUpperCase();
  document.getElementById('ucName').textContent=currentUser?.username||'';
}
function switchAuthTab(tab){
  const isLogin=tab==='login';
  document.getElementById('aTabLogin').classList.toggle('active',isLogin);
  document.getElementById('aTabRegister').classList.toggle('active',!isLogin);
  document.getElementById('aConfirmFg').style.display=isLogin?'none':'';
  document.getElementById('authSubmitBtn').textContent=isLogin?'Войти':'Создать аккаунт';
  document.getElementById('authError').style.display='none';
}

async function submitAuth(){
  const username=document.getElementById('aUsername').value.trim();
  const password=document.getElementById('aPassword').value;
  const isLogin=document.getElementById('aTabLogin').classList.contains('active');
  const errEl=document.getElementById('authError');
  errEl.style.display='none';

  if(!username||!password){ errEl.textContent='Заполните все поля'; errEl.style.display=''; return; }
  if(username.length<3){ errEl.textContent='Логин: минимум 3 символа'; errEl.style.display=''; return; }
  if(password.length<6){ errEl.textContent='Пароль: минимум 6 символов'; errEl.style.display=''; return; }
  if(!isLogin){
    const c=document.getElementById('aConfirm').value;
    if(password!==c){ errEl.textContent='Пароли не совпадают'; errEl.style.display=''; return; }
  }

  const btn=document.getElementById('authSubmitBtn');
  btn.disabled=true; btn.textContent='…';

  try {
    const email=toEmail(username);

    if(isLogin){
      const {data,error}=await sb.auth.signInWithPassword({email,password});
      if(error) throw new Error('Неверный логин или пароль');
      await loadUserAndTasks(data.user);

    } else {
      // Check username not taken
      const {data:existing}=await sb.from('profiles').select('id').eq('username',username).maybeSingle();
      if(existing) throw new Error('Этот логин уже занят');

      // Create auth user
      const {data,error}=await sb.auth.signUp({email,password});
      if(error){
        if(error.message.includes('already registered')) throw new Error('Этот логин уже занят');
        throw new Error(error.message);
      }

      // Sign in to get session
      const {data:loginData,error:loginErr}=await sb.auth.signInWithPassword({email,password});
      if(loginErr) throw new Error('Аккаунт создан — войди вручную');

      // Count profiles to decide is_admin (first user = admin)
      const {count}=await sb.from('profiles').select('*',{count:'exact',head:true});
      const isFirstUser=(count===0||count===null||count==='0');
      const {error:profErr}=await sb.from('profiles').insert({
        id:loginData.user.id, username, is_admin: isFirstUser
      });
      if(profErr) throw new Error('Ошибка создания профиля: '+profErr.message);

      await loadUserAndTasks(loginData.user);
    }

    showApp(); render();
    setTimeout(()=>{
      const now=new Date();
      document.getElementById('calScroll').scrollTop=Math.max(0,(now.getHours()*60+now.getMinutes())/60*HH-100);
    },150);
  } catch(e){
    errEl.textContent=e.message; errEl.style.display='';
  } finally {
    btn.disabled=false;
    btn.textContent=document.getElementById('aTabLogin').classList.contains('active')?'Войти':'Создать аккаунт';
  }
}

async function loadUserAndTasks(user){
  const [{data:profile},{data:taskRows}]=await Promise.all([
    sb.from('profiles').select('*').eq('id',user.id).single(),
    sb.from('tasks').select('*')
  ]);
  currentUser={ id:user.id, username:profile.username, isAdmin:profile.is_admin };
  tasks=(taskRows||[]).map(fromDb);
}

async function logout(){
  await sb.auth.signOut();
  currentUser=null; tasks=[]; currentTab='week';
  showAuth();
  document.getElementById('aUsername').value='';
  document.getElementById('aPassword').value='';
  document.getElementById('aConfirm').value='';
  document.getElementById('authError').style.display='none';
  switchAuthTab('login');
}

// ── WEEK DAYS ──────────────────────────────────────────────────────────────
function getWeekDays(){
  const arr=[],base=new Date(); base.setHours(0,0,0,0);
  for(let i=0;i<7;i++){const d=new Date(base);d.setDate(d.getDate()+i);arr.push(d)}
  return arr;
}

// ── OVERLAP ────────────────────────────────────────────────────────────────
function checkOverlap(taskId,date,startT,endT){
  const s=t2m(startT),e=endT?t2m(endT):s+60;
  for(const t of tasks){
    if(t.id===taskId||t.date!==date||!t.startTime) continue;
    const ts=t2m(t.startTime),te=t.endTime?t2m(t.endTime):ts+60;
    if(s<te&&e>ts) return true;
  }
  return false;
}

// ── TAB SWITCH ─────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabWeek').classList.toggle('active',tab==='week');
  document.getElementById('tabAll').classList.toggle('active',tab==='all');
  document.getElementById('tabAdmin').classList.toggle('active',tab==='admin');
  document.getElementById('weekView').style.display=tab==='week'?'flex':'none';
  document.getElementById('allView').classList.toggle('active',tab==='all');
  document.getElementById('adminView').classList.toggle('active',tab==='admin');
  if(tab==='all') renderAllTasks();
  if(tab==='admin') renderAdmin();
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  weekDays=getWeekDays();
  renderHeaders(); renderAllday(); renderTimeLabels(); renderDayCols();
  renderFuture(); updateNowLine();
  if(currentTab==='all') renderAllTasks();
}
function renderHeaders(){
  const today=todayStr(),c=document.getElementById('dayHeaders');c.innerHTML='';
  weekDays.forEach((d,i)=>{
    const ds=ymd(d),isTd=ds===today;
    const el=document.createElement('div');
    el.className='day-col-hdr'+(isTd?' today':'');
    el.dataset.i=i;el.dataset.date=ds;
    el.innerHTML=`<div class="dh-name">${DN[d.getDay()]}</div><div class="dh-num">${d.getDate()}</div><div class="dh-month">${isTd?'сегодня':MN[d.getMonth()]}</div>`;
    el.onclick=()=>openModal(ds,null,null);
    c.appendChild(el);
  });
  const now=new Date();
  document.getElementById('hdrToday').textContent=`${now.getDate()} ${MN[now.getMonth()]} ${now.getFullYear()}`;
}
function renderAllday(){
  const c=document.getElementById('alldayCells');c.innerHTML='';
  weekDays.forEach(d=>{
    const ds=ymd(d),cell=document.createElement('div');
    cell.className='allday-cell';cell.dataset.date=ds;
    tasks.filter(t=>t.date===ds&&!t.startTime).forEach(t=>{
      const chip=document.createElement('div');
      chip.className='allday-chip s-'+t.status;
      chip.title=t.title;chip.textContent=t.title;
      chip.onclick=()=>openEditModal(t.id);
      chip.addEventListener('contextmenu',e=>showCtxMenu(e,t.id));
      cell.appendChild(chip);
    });
    c.appendChild(cell);
  });
}
function renderTimeLabels(){
  const c=document.getElementById('timeLabels');c.innerHTML='';
  for(let h=DS;h<DE;h++){
    const el=document.createElement('div');
    el.className='time-lbl';el.style.height=HH+'px';el.textContent=`${h}:00`;
    c.appendChild(el);
  }
}
function renderDayCols(){
  const today=todayStr(),c=document.getElementById('dayCols');c.innerHTML='';
  weekDays.forEach((d,i)=>{
    const ds=ymd(d),isTd=ds===today;
    const col=document.createElement('div');
    col.className='day-col'+(isTd?' today':'');
    col.dataset.i=i;col.dataset.date=ds;col.style.height=(TOTAL_H*HH)+'px';
    for(let h=DS;h<DE;h++){
      const slot=document.createElement('div');
      slot.className='hour-slot';
      slot.style.cssText=`position:absolute;top:${(h-DS)*HH}px;left:0;right:0;height:${HH}px`;
      slot.onclick=e=>onSlotClick(e,ds,h);
      col.appendChild(slot);
    }
    const di=document.createElement('div');di.className='drop-ind';di.id='di-'+i;
    col.appendChild(di);
    tasks.filter(t=>t.date===ds&&t.startTime).forEach(t=>col.appendChild(makeTaskBlock(t)));
    c.appendChild(col);
  });
}
function makeTaskBlock(task){
  const sm=t2m(task.startTime),em=task.endTime?t2m(task.endTime):sm+60;
  const b=document.createElement('div');
  b.className='task-block s-'+task.status;
  b.id='tb-'+task.id;b.dataset.id=task.id;
  b.style.top=((sm-DS*60)/60*HH)+'px';b.style.height=Math.max(22,(em-sm)/60*HH)+'px';
  const timeStr=fmt(task.startTime)+(task.endTime?' – '+fmt(task.endTime):'');
  const badge=task.status!=='pending'?`<div class="tb-badge s-${task.status}">${STATUS_LABEL[task.status]}</div>`:'';
  b.innerHTML=`<div class="tb-title">${esc(task.title)}</div><div class="tb-time">${timeStr}</div>${badge}<div class="resize-handle" data-id="${task.id}"></div>`;
  b.addEventListener('mousedown',e=>onDragStart(e,task.id));
  b.addEventListener('contextmenu',e=>showCtxMenu(e,task.id));
  b.querySelector('.resize-handle').addEventListener('mousedown',e=>onResizeStart(e,task.id));
  return b;
}
function renderFuture(){
  const weekEnd=new Date();weekEnd.setHours(0,0,0,0);weekEnd.setDate(weekEnd.getDate()+7);
  const ft=tasks.filter(t=>t.date&&parseDate(t.date)>=weekEnd)
    .sort((a,b)=>a.date.localeCompare(b.date)||(a.startTime||'').localeCompare(b.startTime||''));
  document.getElementById('fpCount').textContent=ft.length;
  const body=document.getElementById('fpBody');body.innerHTML='';
  ft.forEach(t=>{
    const d=parseDate(t.date),item=document.createElement('div');item.className='fp-item';
    item.innerHTML=`<div class="fp-date">${d.getDate()} ${MN[d.getMonth()]}, ${DN[d.getDay()]}</div><div class="fp-name">${esc(t.title)}</div>${t.startTime?`<div class="fp-time">${fmt(t.startTime)}${t.endTime?' – '+fmt(t.endTime):''}</div>`:''}<span class="fp-status s-${t.status}">${STATUS_LABEL[t.status]}</span>`;
    item.onclick=()=>openEditModal(t.id);
    item.addEventListener('contextmenu',e=>showCtxMenu(e,t.id));
    body.appendChild(item);
  });
  document.getElementById('futurePanel').style.display=ft.length===0?'none':'';
}
function toggleFuture(){ document.getElementById('futurePanel').classList.toggle('collapsed') }

// ── ALL TASKS VIEW ─────────────────────────────────────────────────────────
function renderAllTasks(){
  const c=document.getElementById('allView');c.innerHTML='';
  if(!tasks.length){ c.innerHTML='<div class="all-empty">Нет ни одного дела.<br>Нажмите «+ Новое дело», чтобы добавить.</div>'; return; }
  const noDate=tasks.filter(t=>!t.date).sort((a,b)=>a.title.localeCompare(b.title));
  const withDate=tasks.filter(t=>t.date).sort((a,b)=>a.date.localeCompare(b.date)||(a.startTime||'').localeCompare(b.startTime||''));
  if(noDate.length){
    const sec=document.createElement('div');sec.className='all-section';
    const hdr=document.createElement('div');hdr.className='all-section-hdr no-date-hdr';hdr.textContent='Без даты';
    sec.appendChild(hdr);noDate.forEach(t=>sec.appendChild(makeAllRow(t)));c.appendChild(sec);
  }
  const byDate={};withDate.forEach(t=>{if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push(t)});
  const today=todayStr(),weekEnd=new Date();weekEnd.setHours(0,0,0,0);weekEnd.setDate(weekEnd.getDate()+7);
  Object.keys(byDate).sort().forEach(ds=>{
    const d=parseDate(ds),isPast=parseDate(ds)<new Date(today),isToday=ds===today,isFuture=parseDate(ds)>=weekEnd;
    let label=`${d.getDate()} ${MN[d.getMonth()]} ${d.getFullYear()}, ${DN[d.getDay()]}`;
    if(isToday) label+=' — сегодня'; else if(isPast) label+=' — прошедшее'; else if(isFuture) label+=' — будущее';
    const sec=document.createElement('div');sec.className='all-section';
    const hdr=document.createElement('div');hdr.className='all-section-hdr';hdr.textContent=label;
    if(isPast&&!isToday) hdr.style.opacity='.45';
    sec.appendChild(hdr);byDate[ds].forEach(t=>sec.appendChild(makeAllRow(t)));c.appendChild(sec);
  });
}
function makeAllRow(task){
  const card=document.createElement('div');card.className='all-card s-'+task.status;
  const d=task.date?parseDate(task.date):null;
  const metaParts=[];
  if(d) metaParts.push(`${d.getDate()} ${MN[d.getMonth()]} ${d.getFullYear()} · ${DN[d.getDay()]}`);
  if(task.startTime) metaParts.push(fmt(task.startTime)+(task.endTime?' – '+fmt(task.endTime):''));
  else if(task.date) metaParts.push('Весь день');
  const meta=metaParts.join(' · ');
  card.innerHTML=`
    <div class="ac-body">
      <div class="ac-title">${esc(task.title)}</div>
      ${meta?`<div class="ac-meta">${meta}</div>`:''}
      ${task.description?`<div class="ac-desc">${esc(task.description)}</div>`:''}
    </div>
    <span class="ac-status s-${task.status}">${STATUS_LABEL[task.status]}</span>`;
  card.onclick=()=>openEditModal(task.id);
  card.addEventListener('contextmenu',e=>showCtxMenu(e,task.id));
  return card;
}

// ── ADMIN VIEW ─────────────────────────────────────────────────────────────
async function renderAdmin(){
  const c=document.getElementById('adminView');
  c.innerHTML='<div class="admin-loading">Загрузка…</div>';
  const {data:users,error}=await sb.rpc('admin_get_users');
  if(error){ c.innerHTML=`<div class="admin-loading" style="color:var(--err)">Ошибка: ${esc(sbErr(error))}</div>`; return; }
  c.innerHTML='';
  const wrap=document.createElement('div');wrap.className='admin-wrap';
  const hdr=document.createElement('div');hdr.className='admin-hdr';
  hdr.innerHTML=`<span class="admin-title">Пользователи</span><span class="admin-sub">${plural(users.length,'аккаунт','аккаунта','аккаунтов')}</span>`;
  wrap.appendChild(hdr);
  users.forEach(u=>{
    const isMe=u.id===currentUser?.id;
    const card=document.createElement('div');card.className='user-card';card.id='uc-'+u.id;
    const joined=new Date(u.created_at);
    card.innerHTML=`
      <div class="u-avatar${u.is_admin?' is-admin':''}">${u.username[0].toUpperCase()}</div>
      <div class="u-info">
        <div class="u-name">${esc(u.username)}${u.is_admin?'<span class="u-badge admin">Админ</span>':''}${isMe?'<span class="u-badge you">Вы</span>':''}</div>
        <div class="u-meta">Зарегистрирован ${joined.getDate()} ${MN[joined.getMonth()]} ${joined.getFullYear()}</div>
      </div>
      <div class="u-tasks">${plural(u.task_count,'дело','дела','дел')}</div>`;
    if(!isMe&&!u.is_admin){
      const del=document.createElement('button');del.className='btn btn-danger btn-sm';del.textContent='Удалить';
      del.onclick=()=>deleteUser(u.id,u.username);
      card.appendChild(del);
    }
    wrap.appendChild(card);
  });
  c.appendChild(wrap);
}
async function deleteUser(userId,username){
  const card=document.getElementById('uc-'+userId);
  if(card){card.style.opacity='.4';card.style.pointerEvents='none';}
  const {error}=await sb.rpc('admin_delete_user',{target_id:userId});
  if(error){
    if(card){card.style.opacity='';card.style.pointerEvents='';}
    showToast(sbErr(error),'err');
  } else {
    showToast(`Пользователь «${username}» удалён`);
    renderAdmin();
  }
}
function plural(n,one,few,many){
  if(n%10===1&&n%100!==11) return `${n} ${one}`;
  if(n%10>=2&&n%10<=4&&(n%100<10||n%100>=20)) return `${n} ${few}`;
  return `${n} ${many}`;
}

// ── CONTEXT MENU ───────────────────────────────────────────────────────────
function showCtxMenu(e,id){
  e.preventDefault();e.stopPropagation();
  ctxTaskId=id;
  const task=tasks.find(t=>t.id===id);if(!task) return;
  document.querySelectorAll('.ctx-menu [data-s]').forEach(btn=>btn.classList.toggle('checked',btn.dataset.s===task.status));
  const menu=document.getElementById('ctxMenu');
  menu.classList.add('open');menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';
  requestAnimationFrame(()=>{
    const r=menu.getBoundingClientRect();
    if(r.right>window.innerWidth) menu.style.left=(e.clientX-r.width)+'px';
    if(r.bottom>window.innerHeight) menu.style.top=(e.clientY-r.height)+'px';
  });
}
function ctxAction(action,val){
  const id=ctxTaskId; closeCtxMenu(); if(!id) return;
  if(action==='edit'){ openEditModal(id); return; }
  if(action==='delete'){
    const saved=tasks.slice(); tasks=tasks.filter(t=>t.id!==id); render();
    sb.from('tasks').delete().eq('id',id)
      .then(({error})=>{ if(error){tasks=saved;render();showToast(sbErr(error),'err');}else showToast('Дело удалено'); });
    return;
  }
  if(action==='status'){
    const t=tasks.find(x=>x.id===id);if(!t) return;
    const old=t.status; t.status=val; render();
    sb.from('tasks').update({status:val}).eq('id',id)
      .then(({error})=>{ if(error){t.status=old;render();showToast(sbErr(error),'err');}else showToast('Статус: '+STATUS_LABEL[val]); });
  }
}
function closeCtxMenu(){ document.getElementById('ctxMenu').classList.remove('open');ctxTaskId=null; }

// ── NOW LINE ───────────────────────────────────────────────────────────────
function updateNowLine(){
  document.querySelectorAll('.now-line').forEach(e=>e.remove());
  const now=new Date(),idx=weekDays.findIndex(d=>ymd(d)===todayStr());if(idx<0) return;
  const m=now.getHours()*60+now.getMinutes();if(m<DS*60||m>DE*60) return;
  const col=document.querySelector('.day-col[data-i="'+idx+'"]');if(!col) return;
  const line=document.createElement('div');line.className='now-line';line.style.top=((m-DS*60)/60*HH)+'px';
  col.appendChild(line);
}

// ── SLOT CLICK ─────────────────────────────────────────────────────────────
function onSlotClick(e,date,hour){
  if(e.target.closest('.task-block')) return;
  openModal(date,m2t(hour*60),m2t(Math.min((hour+1)*60,DE*60)));
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(date,startT,endT){
  editId=null;selStatus='pending';
  document.getElementById('modalTitle').textContent='Новое дело';
  document.getElementById('btnDelete').style.display='none';
  document.getElementById('fTitle').value='';document.getElementById('fDesc').value='';
  const today=todayStr(),max=new Date();max.setMonth(max.getMonth()+6);
  const df=document.getElementById('fDate');df.value=date||today;df.min=today;df.max=ymd(max);
  document.getElementById('fStart').value=startT||'';document.getElementById('fEnd').value=endT||'';
  updateStatusBtns();document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),120);
}
function openEditModal(id){
  const t=tasks.find(x=>x.id===id);if(!t) return;
  editId=id;selStatus=t.status||'pending';
  document.getElementById('modalTitle').textContent='Редактировать дело';
  document.getElementById('btnDelete').style.display='';
  document.getElementById('fTitle').value=t.title;document.getElementById('fDesc').value=t.description||'';
  const today=todayStr(),max=new Date();max.setMonth(max.getMonth()+6);
  const df=document.getElementById('fDate');df.value=t.date||'';df.min=today;df.max=ymd(max);
  document.getElementById('fStart').value=t.startTime||'';document.getElementById('fEnd').value=t.endTime||'';
  updateStatusBtns();document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),120);
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e){ if(e.target===document.getElementById('overlay')) closeModal(); }
function pickStatus(btn){ selStatus=btn.dataset.s; updateStatusBtns(); }
function updateStatusBtns(){ document.querySelectorAll('.s-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===selStatus)); }

// ── SAVE TASK ──────────────────────────────────────────────────────────────
function saveTask(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){ showToast('Введите название дела','err'); return; }
  const date=document.getElementById('fDate').value;
  const startT=document.getElementById('fStart').value;
  const endT=document.getElementById('fEnd').value;
  if(startT&&endT&&t2m(endT)<=t2m(startT)){ showToast('Время окончания должно быть позже начала','err'); return; }
  if(startT&&endT&&t2m(endT)>DE*60){ showToast('Время выходит за пределы суток','err'); return; }
  if(date&&startT&&checkOverlap(editId||'__new__',date,startT,endT||null)){ showToast('Это время уже занято другим делом','err'); return; }

  const data={ title, date:date||null, startTime:startT||null, endTime:endT||null, description:document.getElementById('fDesc').value.trim(), status:selStatus };

  if(editId){
    const t=tasks.find(x=>x.id===editId); if(t) Object.assign(t,data);
    closeModal(); render();
    sb.from('tasks').update(toDb(data)).eq('id',editId)
      .then(({error})=>{ if(error) showToast(sbErr(error),'err'); else showToast('Дело сохранено'); });
  } else {
    const tempId='tmp-'+uid();
    tasks.push({id:tempId,...data}); closeModal(); render();
    sb.from('tasks').insert({...toDb(data),user_id:currentUser.id}).select().single()
      .then(({data:saved,error})=>{
        if(error){ tasks=tasks.filter(t=>t.id!==tempId); render(); showToast(sbErr(error),'err'); return; }
        const i=tasks.findIndex(t=>t.id===tempId);
        if(i!==-1){ tasks[i]=fromDb(saved); render(); }
        showToast('Дело создано');
      });
  }
}
function deleteEditing(){
  if(!editId) return;
  const id=editId,saved=tasks.slice();
  tasks=tasks.filter(t=>t.id!==id); closeModal(); render();
  sb.from('tasks').delete().eq('id',id)
    .then(({error})=>{ if(error){tasks=saved;render();showToast(sbErr(error),'err');}else showToast('Дело удалено'); });
}

// ── DRAG ───────────────────────────────────────────────────────────────────
function onDragStart(e,id){
  if(e.button!==0||e.target.closest('.resize-handle')) return;
  e.preventDefault();e.stopPropagation();
  const block=document.getElementById('tb-'+id),task=tasks.find(t=>t.id===id);if(!block||!task) return;
  const rect=block.getBoundingClientRect();
  drag={id,offsetX:e.clientX-rect.left,offsetY:e.clientY-rect.top};
  block.classList.add('is-dragging');
  document.body.style.userSelect='none';
  document.body.style.cursor='grabbing';
  ghostEl=document.createElement('div');ghostEl.className='task-block drag-ghost';
  ghostEl.innerHTML=`<div class="tb-title">${esc(task.title)}</div>`;
  ghostEl.style.left=(e.clientX-drag.offsetX)+'px';ghostEl.style.top=(e.clientY-drag.offsetY)+'px';
  document.body.appendChild(ghostEl);
}
function onMouseMove(e){
  if(drag||rz) e.preventDefault();
  if(drag){
    ghostEl.style.left=(e.clientX-drag.offsetX)+'px';ghostEl.style.top=(e.clientY-drag.offsetY)+'px';
    document.querySelectorAll('.drop-ind').forEach(d=>d.style.display='none');
    const target=getDragTarget(e.clientX,e.clientY);
    if(target){
      const di=document.getElementById('di-'+target.colIdx);if(!di) return;
      const task=tasks.find(t=>t.id===drag.id);
      const dur=task.endTime?t2m(task.endTime)-t2m(task.startTime):60;
      const cs=clamp(target.startM,DS*60,DE*60-dur);
      const valid=!checkOverlap(drag.id,target.date,m2t(cs),m2t(cs+dur));
      di.style.cssText=`display:block;top:${(cs-DS*60)/60*HH}px;height:${Math.max(22,dur/60*HH)}px;border-color:${valid?'var(--acc)':'var(--err)'};background:${valid?'var(--acc-d)':'var(--err-d)'}`;
    }
  }
  if(rz){
    const dy=e.clientY-rz.startY;
    const newEndM=clamp(rz.origEndM+snapM(dy/HH*60),rz.origStartM+SNAP,DE*60);
    const block=document.getElementById('tb-'+rz.id);
    if(block) block.style.height=Math.max(22,(newEndM-rz.origStartM)/60*HH)+'px';
    rz.newEndM=newEndM;
  }
}
function onMouseUp(e){
  document.body.style.userSelect='';
  document.body.style.cursor='';
  if(drag){
    document.querySelectorAll('.drop-ind').forEach(d=>d.style.display='none');
    if(ghostEl){ghostEl.remove();ghostEl=null;}
    const block=document.getElementById('tb-'+drag.id);
    if(block) block.classList.remove('is-dragging');
    const target=getDragTarget(e.clientX,e.clientY);
    if(target){
      const task=tasks.find(t=>t.id===drag.id);
      const dur=task.endTime?t2m(task.endTime)-t2m(task.startTime):60;
      const fs=clamp(target.startM,DS*60,DE*60-dur),ne=m2t(fs+dur);
      if(!checkOverlap(drag.id,target.date,m2t(fs),ne)){
        const prev={date:task.date,startTime:task.startTime,endTime:task.endTime};
        task.date=target.date;task.startTime=m2t(fs);task.endTime=ne;
        render();
        sb.from('tasks').update(toDb(task)).eq('id',task.id)
          .catch(()=>{Object.assign(task,prev);render();});
      } else {
        showToast('Это время уже занято','err');render();
      }
    } else render();
    drag=null;
  }
  if(rz){
    const task=tasks.find(t=>t.id===rz.id);
    const newEndT=m2t(rz.newEndM||rz.origEndM);
    if(!checkOverlap(rz.id,task.date,task.startTime,newEndT)){
      const prevEnd=task.endTime; task.endTime=newEndT; render();
      sb.from('tasks').update(toDb(task)).eq('id',task.id)
        .catch(()=>{task.endTime=prevEnd;render();});
    } else {
      showToast('Это время уже занято','err');render();
    }
    rz=null;
  }
}
function getDragTarget(cx,cy){
  const cols=document.querySelectorAll('.day-col');
  const scroll=document.getElementById('calScroll'),scrollRect=scroll.getBoundingClientRect();
  for(const col of cols){
    const rect=col.getBoundingClientRect();
    if(cx>=rect.left&&cx<rect.right&&cy>=scrollRect.top&&cy<scrollRect.bottom){
      const taskTopY=drag?cy-drag.offsetY:cy;
      const relY=taskTopY-rect.top;
      const startM=clamp(snapM(DS*60+relY/HH*60),DS*60,DE*60);
      return{colIdx:parseInt(col.dataset.i),date:col.dataset.date,startM};
    }
  }
  return null;
}

// ── RESIZE ─────────────────────────────────────────────────────────────────
function onResizeStart(e,id){
  e.preventDefault();e.stopPropagation();
  const task=tasks.find(t=>t.id===id);if(!task||!task.startTime) return;
  document.body.style.userSelect='none';
  document.body.style.cursor='ns-resize';
  rz={id,startY:e.clientY,origStartM:t2m(task.startTime),origEndM:task.endTime?t2m(task.endTime):t2m(task.startTime)+60,newEndM:task.endTime?t2m(task.endTime):t2m(task.startTime)+60};
}

// ── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast'+(type?' '+type:'')+' show';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init(){
  applyTheme();
  document.addEventListener('mousemove',onMouseMove);
  document.addEventListener('mouseup',onMouseUp);
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal();closeCtxMenu();} });
  document.addEventListener('click',e=>{ if(!e.target.closest('.ctx-menu')) closeCtxMenu(); });
  document.addEventListener('contextmenu',e=>{ if(!e.target.closest('.task-block,.allday-chip,.fp-item,.all-card')) closeCtxMenu(); });
  ['aUsername','aPassword','aConfirm'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown',e=>{ if(e.key==='Enter') submitAuth(); });
  });

  // Check existing session
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    try {
      await loadUserAndTasks(session.user);
      showApp(); render();
      setTimeout(()=>{
        const now=new Date();
        document.getElementById('calScroll').scrollTop=Math.max(0,(now.getHours()*60+now.getMinutes())/60*HH-100);
      },150);
    } catch {
      showAuth();
    }
  } else {
    showAuth();
  }
  setInterval(updateNowLine,60000);
}

init();
</script>
